# fly.toml app configuration file
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'marangatu-web'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  GEMINI_MODEL = 'gemini-2.5-pro'
  NODE_ENV = 'production'
  PORT = '3000'
  NODE_OPTIONS = '--max-old-space-size=450'

[processes]
  web = 'node server.js'
  worker = 'node_modules/.bin/tsx src/worker/index.ts'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['web']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['web']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['worker']
