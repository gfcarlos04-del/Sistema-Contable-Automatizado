# Fly.io — Marangatu (web + worker en la misma imagen).
# Región `gru` (São Paulo) por cercanía con Paraguay.
# Reemplazá `app = "..."` con el nombre real cuando hagas `fly launch`.

app = "marangatu-web"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  GEMINI_MODEL = "gemini-2.5-pro"

# Dos procesos sobre la misma imagen.
[processes]
  web = "node server.js"
  worker = "node_modules/.bin/tsx src/worker/index.ts"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # se duerme si no hay tráfico (free tier friendly)
  processes = ["web"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

# Sólo el proceso web tiene VM corriendo por defecto; el worker se enciende
# al primer push de F2 (cuando arranque la cola Gemini real).
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  processes = ["worker"]
